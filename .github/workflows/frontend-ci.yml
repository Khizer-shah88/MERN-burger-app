name: Frontend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'client/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'client/**'
      - '.github/workflows/frontend-ci.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: client

      - name: Build
        run: npm run build
        working-directory: client

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub credentials
        id: dockerhub-check
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "available=true" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Login to Docker Hub
        if: steps.dockerhub-check.outputs.available == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # PR = build only (no push)
      - name: Build Docker image (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          tags: burger-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # MAIN = build + push (only if credentials available)
      - name: Build & Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.dockerhub-check.outputs.available == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/burger-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/burger-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build without push (fallback when no credentials)
      - name: Build Docker image (no push)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.dockerhub-check.outputs.available == 'false'
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: false
          tags: burger-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Login to Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # 2. Ensure deployment network exists
            docker network inspect burger-app_burger-net >/dev/null 2>&1 || docker network create burger-app_burger-net

            # 3. Pull the latest images
            docker pull khizershah11/burger-frontend:latest
            docker pull khizershah11/burger-backend:latest

            # 4. Stop and remove old containers
            docker rm -f burger-frontend burger-backend || true

            # 5. Run Backend
            docker run -d \
              --name burger-backend \
              --network burger-app_burger-net \
              -p 5000:5000 \
              -e MONGODB_URI=mongodb://mongodb:27017/burgerdb \
              khizershah11/burger-backend:latest

            # 6. Run Frontend
            docker run -d \
              --name burger-frontend \
              --network burger-app_burger-net \
              -p 3000:80 \
              khizershah11/burger-frontend:latest

            # 7. Cleanup old images to save disk space
            docker image prune -f
