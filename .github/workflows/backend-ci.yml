name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ LOGIN ONLY ON PUSH TO MAIN
      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # PR = build only
      - name: Build Docker image (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: burger-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # MAIN = build + push
      - name: Build & Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            khizershah11/burger-backend:latest
            khizershah11/burger-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./backend
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare deploy SSH key
        shell: bash
        run: |
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "EC2_SSH_KEY secret is empty"
            exit 1
          fi

          if echo "${{ secrets.EC2_SSH_KEY }}" | grep -q "\\\\n"; then
            printf "%b" "${{ secrets.EC2_SSH_KEY }}" > "$GITHUB_WORKSPACE/ec2_deploy_key"
          else
            printf "%s" "${{ secrets.EC2_SSH_KEY }}" > "$GITHUB_WORKSPACE/ec2_deploy_key"
          fi

          tr -d '\r' < "$GITHUB_WORKSPACE/ec2_deploy_key" > "$GITHUB_WORKSPACE/ec2_deploy_key.tmp"
          mv "$GITHUB_WORKSPACE/ec2_deploy_key.tmp" "$GITHUB_WORKSPACE/ec2_deploy_key"

          if ! grep -q "BEGIN .* PRIVATE KEY" "$GITHUB_WORKSPACE/ec2_deploy_key"; then
            echo "EC2_SSH_KEY does not look like a private key"
            exit 1
          fi

          chmod 600 "$GITHUB_WORKSPACE/ec2_deploy_key"

      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key_path: /github/workspace/ec2_deploy_key
          script: |
            # 1. Login to Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # 2. Ensure deployment network exists
            docker network inspect burger-app_burger-net >/dev/null 2>&1 || docker network create burger-app_burger-net

            # 3. Pull the latest images
            docker pull khizershah11/burger-frontend:latest
            docker pull khizershah11/burger-backend:latest

            # 4. Stop and remove old containers
            docker rm -f burger-frontend burger-backend || true

            # 5. Run Backend
            docker run -d \
              --name burger-backend \
              --network burger-app_burger-net \
              -p 5000:5000 \
              -e MONGODB_URI=mongodb://mongodb:27017/burgerdb \
              khizershah11/burger-backend:latest

            # 6. Run Frontend
            docker run -d \
              --name burger-frontend \
              --network burger-app_burger-net \
              -p 3000:80 \
              khizershah11/burger-frontend:latest

            # 7. Cleanup old images to save disk space
            docker image prune -f
