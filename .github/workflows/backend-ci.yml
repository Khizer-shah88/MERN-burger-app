name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

  pull_request:
    branches: [ main ]
    paths:
      - 'backend/**'

permissions:
  contents: read
  security-events: write

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ✅ LOGIN ONLY ON PUSH TO MAIN
      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # PR = build only
      - name: Build Docker image (PR)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: burger-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # MAIN = build + push
      - name: Build & Push Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            khizershah11/burger-backend:latest
            khizershah11/burger-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: ./backend
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare deploy SSH key and vars
        id: deploy-vars
        shell: bash
        run: |
          host="$(printf '%s' "${{ secrets.EC2_HOST }}" | tr -d '\r\n' | xargs)"
          user="$(printf '%s' "${{ secrets.EC2_USERNAME }}" | tr -d '\r\n' | xargs)"

          if [ -z "$host" ]; then
            echo "EC2_HOST secret is empty or invalid"
            exit 1
          fi

          if [ -z "$user" ]; then
            echo "EC2_USERNAME secret is empty or invalid"
            exit 1
          fi

          echo "ec2_host=$host" >> "$GITHUB_OUTPUT"
          echo "ec2_user=$user" >> "$GITHUB_OUTPUT"

          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then
            echo "EC2_SSH_KEY secret is empty"
            exit 1
          fi

          raw_key="${{ secrets.EC2_SSH_KEY }}"
          raw_key="$(printf '%s' "$raw_key" | tr -d '\r')"

          # Remove accidental wrapping quotes from secret value.
          if [[ "$raw_key" == \"*\" && "$raw_key" == *\" ]]; then
            raw_key="${raw_key:1:${#raw_key}-2}"
          fi
          if [[ "$raw_key" == \''*\' && "$raw_key" == *\' ]]; then
            raw_key="${raw_key:1:${#raw_key}-2}"
          fi

          # Support both multiline PEM and single-line values with escaped newlines.
          if printf '%s' "$raw_key" | grep -q "\\\\n"; then
            printf "%b" "$raw_key" > "$RUNNER_TEMP/ec2_deploy_key"
          else
            printf "%s" "$raw_key" > "$RUNNER_TEMP/ec2_deploy_key"
          fi

          # Fallback: allow a base64-encoded key in the same secret.
          if ! grep -q "BEGIN .* PRIVATE KEY" "$RUNNER_TEMP/ec2_deploy_key"; then
            if printf '%s' "$raw_key" | base64 -d > "$RUNNER_TEMP/ec2_deploy_key" 2>/dev/null; then
              :
            fi
          fi

          tr -d '\r' < "$RUNNER_TEMP/ec2_deploy_key" > "$RUNNER_TEMP/ec2_deploy_key.tmp"
          mv "$RUNNER_TEMP/ec2_deploy_key.tmp" "$RUNNER_TEMP/ec2_deploy_key"

          if ! grep -q "BEGIN .* PRIVATE KEY" "$RUNNER_TEMP/ec2_deploy_key" || ! grep -q "END .* PRIVATE KEY" "$RUNNER_TEMP/ec2_deploy_key"; then
            echo "EC2_SSH_KEY must be a valid PEM private key (raw multiline, escaped \\n, or base64-encoded PEM)."
            exit 1
          fi

          chmod 600 "$RUNNER_TEMP/ec2_deploy_key"

          if ! ssh-keygen -y -f "$RUNNER_TEMP/ec2_deploy_key" >/dev/null 2>&1; then
            echo "EC2_SSH_KEY is not a valid private key"
            exit 1
          fi

          {
            echo "ec2_key<<EOF"
            cat "$RUNNER_TEMP/ec2_deploy_key"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.deploy-vars.outputs.ec2_host }}
          username: ${{ steps.deploy-vars.outputs.ec2_user }}
          key: ${{ steps.deploy-vars.outputs.ec2_key }}
          script: |
            # 1. Login to Docker Hub
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # 2. Ensure deployment network exists
            docker network inspect burger-app_burger-net >/dev/null 2>&1 || docker network create burger-app_burger-net

            # 3. Pull the latest images
            docker pull khizershah11/burger-frontend:latest
            docker pull khizershah11/burger-backend:latest

            # 4. Stop and remove old containers
            docker rm -f burger-frontend burger-backend || true

            # 5. Run Backend
            docker run -d \
              --name burger-backend \
              --network burger-app_burger-net \
              -p 5000:5000 \
              -e MONGODB_URI=mongodb://mongodb:27017/burgerdb \
              khizershah11/burger-backend:latest

            # 6. Run Frontend
            docker run -d \
              --name burger-frontend \
              --network burger-app_burger-net \
              -p 3000:80 \
              khizershah11/burger-frontend:latest

            # 7. Cleanup old images to save disk space
            docker image prune -f
